<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Performance Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --ink:#12181F;
    --panel:#1B232C;
    --panel-2:#212B36;
    --line:#2A3441;
    --amber:#FF8A3D;
    --teal:#35D0B0;
    --violet:#9B8CF2;
    --rose:#F2618C;
    --text:#EDEFF2;
    --muted:#8891A0;
    --faint:#5C6675;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 20px 60px;}
  .display{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.02em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .eyebrow{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:16px;}
  header.top h1{font-size:26px;margin:2px 0 0;color:var(--text);}
  .lede{color:var(--muted);font-size:13px;margin-top:4px;}

  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:16px;}
  .bar .grp{display:flex;align-items:center;gap:8px;}
  select, .btn, input[type=file]::file-selector-button{
    background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:7px;
    padding:7px 12px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;
  }
  select:hover,.btn:hover{border-color:var(--faint);}
  .btn.primary{background:var(--amber);color:#241203;border-color:var(--amber);font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);}
  .segmented{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .segmented button{background:transparent;border:none;color:var(--muted);padding:7px 14px;font-size:13px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.03em;}
  .segmented button.active{background:var(--amber);color:#241203;}
  .navbtn{background:none;border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:14px;}
  .navbtn:hover{color:var(--text);border-color:var(--faint);}
  .rangelabel{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);min-width:150px;text-align:center;}
  .filelbl{font-size:12px;color:var(--muted);}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:9px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:.02em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--text);border-bottom-color:var(--amber);}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:1px;}

  .kpirow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
  .kpi .bar-accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
  .kpi .lbl{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .kpi .val{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:var(--text);margin-top:6px;letter-spacing:.01em;}
  .kpi .sub{font-size:11px;color:var(--faint);margin-top:4px;}

  .kpi.pct{background:transparent;border:1px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 8px;}
  .kpi.pct .lbl{color:var(--faint);}
  .kpi.pct .pctval{font-size:20px;color:var(--teal);margin-top:6px;}

  .kpi.funnelcard{grid-column:1/-1;}
  .funnel-row{display:flex;align-items:center;gap:16px;margin-top:12px;flex-wrap:wrap;}
  .funnel-stage{text-align:center;min-width:64px;}
  .funnel-stage .fval{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--text);font-weight:600;}
  .funnel-stage .fname{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .funnel-arrow{display:flex;flex-direction:column;align-items:center;color:var(--faint);font-size:16px;}
  .funnel-arrow span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);margin-top:2px;}

  .grid2{display:grid;grid-template-columns:1.15fr 0.85fr;gap:16px;margin-bottom:20px;}
  @media(max-width:820px){.grid2{grid-template-columns:1fr;}}
  .panelbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;}
  .panelbox h3{margin:0 0 12px;font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:.02em;color:var(--text);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--faint);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);}
  td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  tr.lvl0>td:first-child{font-weight:600;color:var(--text);}
  tr.lvl1>td:first-child{padding-left:22px;color:#c6cbd3;}
  tr.lvl2>td:first-child{padding-left:40px;color:var(--muted);}
  tr.lvl0{background:rgba(255,255,255,0.02);cursor:pointer;}
  .tval{font-family:'JetBrains Mono',monospace;text-align:right;}
  .caret{display:inline-block;width:12px;color:var(--faint);}

  .gaugestrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
  .gauge{flex:0 0 auto;width:64px;text-align:center;cursor:pointer;padding:8px 4px;border-radius:8px;border:1px solid transparent;}
  .gauge:hover{border-color:var(--line);background:var(--panel-2);}
  .gauge .dow{font-size:10px;color:var(--faint);text-transform:uppercase;font-family:'Rajdhani',sans-serif;letter-spacing:.06em;}
  .gauge .dnum{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--text);margin:4px 0;}
  .gauge svg{display:block;margin:0 auto;}

  .modal-overlay{position:fixed;inset:0;background:rgba(6,9,13,0.72);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:760px;width:100%;max-height:85vh;overflow-y:auto;padding:22px 24px;}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .modal-head h2{margin:0;font-family:'Rajdhani',sans-serif;font-size:22px;}
  .modal-head .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .closebtn{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;}
  .modal-team{border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:10px;}
  .modal-team .mt-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .modal-team .mt-head .dot{width:8px;height:8px;border-radius:50%;}
  .modal-team .mt-head b{font-family:'Rajdhani',sans-serif;font-size:14px;}
  .mt-metrics{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px;}
  .mt-metrics div{font-family:'JetBrains Mono',monospace;font-size:13px;}
  .mt-metrics span{display:block;font-family:'Inter',sans-serif;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;}
  .modal-metric-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
  .modal-metric-table th{text-align:right;color:var(--faint);font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);}
  .modal-metric-table th:first-child{text-align:left;}
  .modal-metric-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .modal-metric-table td.tval{text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text);}
  .modal-metric-table td.pctcell{color:var(--teal);}
  .modal-metric-table tr.tl-row{cursor:pointer;background:rgba(255,255,255,0.03);font-weight:600;}
  .modal-metric-table tr.tl-row:hover{background:rgba(255,255,255,0.06);}
  .modal-metric-table tr.tl-row td:first-child{color:var(--text);}
  .modal-metric-table tr.exec-row td.indent{padding-left:26px;color:var(--muted);font-weight:400;}
  .modal-metric-table .caret{display:inline-block;width:12px;color:var(--faint);}

  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty .display{font-size:20px;color:var(--text);margin-bottom:8px;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="eyebrow">Multi-team ops</div>
      <h1 class="display">Team performance command center</h1>
      <div class="lede">Sales &middot; CRM &middot; Accessories &middot; Finance &middot; Extended Warranty</div>
    </div>
  </header>

  <div class="bar" style="margin-bottom:10px;justify-content:space-between;">
    <div class="lede" id="fileStatus" style="margin:0;">Connecting to live data...</div>
    <button class="btn" id="refreshBtn" title="Re-fetch latest data">&#8635; Refresh</button>
  </div>

  <div class="bar">
    <div class="grp">
      <span class="eyebrow">Branch</span>
      <select id="branchSel"></select>
    </div>
    <div class="grp">
      <span class="eyebrow">View</span>
      <div class="segmented" id="periodSeg">
        <button data-p="day">Day</button>
        <button data-p="week">Week</button>
        <button data-p="month">Month</button>
      </div>
    </div>
    <div class="grp">
      <button class="navbtn" id="prevBtn">&#8249;</button>
      <div class="rangelabel" id="rangeLabel">-</div>
      <button class="navbtn" id="nextBtn">&#8250;</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="kpiRow" class="kpirow"></div>

  <div class="grid2">
    <div class="panelbox">
      <h3>Reporting chain &mdash; Branch Manager &rarr; Team Leader &rarr; Executive</h3>
      <table id="hierTable"><thead></thead><tbody></tbody></table>
    </div>
    <div class="panelbox">
      <h3 id="chartTitle">Trend</h3>
      <div style="position:relative;height:230px;">
        <canvas id="trendChart" role="img" aria-label="Trend chart of team metrics over time"></canvas>
      </div>
    </div>
  </div>

  <div class="panelbox">
    <h3>Daily gauge strip &mdash; click a day for the full breakdown</h3>
    <div class="gaugestrip" id="gaugeStrip"></div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modalDate">-</h2>
        <div class="sub" id="modalSub">Team-wise breakdown</div>
      </div>
      <button class="closebtn" id="modalClose">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const TEAMS = {
  sales: {label:'Sales', color:'#FF8A3D', metrics:['enquiry','testDrive','bookings','retail'],
    metricLabels:{enquiry:'Enquiry', testDrive:'Test drive', bookings:'Bookings', retail:'Retail'}},
  crm: {label:'CRM', color:'#9B8CF2', metrics:['calls'], metricLabels:{calls:'Calls'}},
  accessories: {label:'Accessories', color:'#35D0B0', metrics:['accOrders'], metricLabels:{accOrders:'Orders'}},
  finance: {label:'Finance', color:'#F2618C', metrics:['financeDone'], metricLabels:{financeDone:'Finance done'}},
  warranty: {label:'Extended warranty', color:'#5EB6F0', metrics:['warrantyDone'], metricLabels:{warrantyDone:'Warranty done'}},
};
const TEAM_ORDER = ['sales','crm','accessories','finance','warranty'];
const TEAM_NAME_MAP = {'sales':'sales','crm':'crm','accessories':'accessories','finance':'finance',
  'extended warranty':'warranty','warranty':'warranty','extendedwarranty':'warranty'};

function toLocalISO(d){
  // Converts a Date to YYYY-MM-DD using LOCAL date parts, never UTC.
  // (date.toISOString() converts to UTC first, which silently shifts
  // the calendar date by a day in timezones ahead of UTC, e.g. India.)
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

let rows = [];
let branches = [];
let state = {branch:'All branches', period:'day', anchor:null, tab:'overview'};
let trendChartInst = null;

function genSample(){
  const branchesList = ['Vijayawada','Guntur'];
  const bmByBranch = {'Vijayawada':'Ravi Kumar','Guntur':'Meena Iyer'};
  const salesTL = {'Vijayawada':'Suresh Babu','Guntur':'Arjun Nair'};
  const crmTL = {'Vijayawada':'Lakshmi Devi','Guntur':'Farhan Ali'};
  const otherTL = {'Vijayawada':'Manoj Singh','Guntur':'Deepa Menon'};
  const salesExecs = {'Vijayawada':['Anil Reddy','Kiran Varma','Sowmya N'],'Guntur':['Rahul Sinha','Bhavana K']};
  const creExecs = {'Vijayawada':['Priya Sharma','Divya Rao'],'Guntur':['Naveen Kumar','Swathi P']};
  const otherExecs = {'Vijayawada':['Vikram Chowdary'],'Guntur':['Ayesha Begum']};
  const out = [];
  const today = new Date('2026-07-01T00:00:00');
  for(let d=27; d>=0; d--){
    const dt = new Date(today); dt.setDate(dt.getDate()-d);
    const ds = toLocalISO(dt);
    branchesList.forEach(br=>{
      salesExecs[br].forEach(ex=>{
        out.push({date:ds,branch:br,bm:bmByBranch[br],team:'sales',tl:salesTL[br],exec:ex,
          enquiry: 4+Math.floor(Math.random()*10), testDrive: 1+Math.floor(Math.random()*5),
          bookings: Math.floor(Math.random()*4), retail: Math.floor(Math.random()*3),
          calls:0,accOrders:0,financeDone:0,warrantyDone:0});
      });
      creExecs[br].forEach(ex=>{
        out.push({date:ds,branch:br,bm:bmByBranch[br],team:'crm',tl:crmTL[br],exec:ex,
          enquiry:0,testDrive:0,bookings:0,retail:0,
          calls: 15+Math.floor(Math.random()*30), accOrders:0,financeDone:0,warrantyDone:0});
      });
      otherExecs[br].forEach(ex=>{
        out.push({date:ds,branch:br,bm:bmByBranch[br],team:'accessories',tl:otherTL[br],exec:ex,
          enquiry:0,testDrive:0,bookings:0,retail:0,calls:0,
          accOrders: Math.floor(Math.random()*6), financeDone:0,warrantyDone:0});
        out.push({date:ds,branch:br,bm:bmByBranch[br],team:'finance',tl:otherTL[br],exec:ex,
          enquiry:0,testDrive:0,bookings:0,retail:0,calls:0,accOrders:0,
          financeDone: Math.floor(Math.random()*4), warrantyDone:0});
        out.push({date:ds,branch:br,bm:bmByBranch[br],team:'warranty',tl:otherTL[br],exec:ex,
          enquiry:0,testDrive:0,bookings:0,retail:0,calls:0,accOrders:0,financeDone:0,
          warrantyDone: Math.floor(Math.random()*3)});
      });
    });
  }
  return out;
}

function normHeader(h){ return String(h||'').trim().toLowerCase().replace(/[^a-z0-9]/g,''); }

function parseSheetRows(json){
  const out = [];
  json.forEach(r=>{
    const map = {};
    Object.keys(r).forEach(k=> map[normHeader(k)] = r[k]);
    const teamRaw = String(map['team']||'').trim().toLowerCase();
    const team = TEAM_NAME_MAP[teamRaw] || TEAM_NAME_MAP[teamRaw.replace(/\s+/g,'')] || null;
    if(!team) return;
    let dateVal = map['date'];
    let ds;
    if(dateVal instanceof Date){ ds = toLocalISO(dateVal); }
    else if(typeof dateVal === 'number'){
      const d = XLSX.SSF.parse_date_code(dateVal);
      ds = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    } else {
      const parsed = new Date(dateVal);
      ds = isNaN(parsed) ? String(dateVal) : toLocalISO(parsed);
    }
    out.push({
      date: ds,
      branch: String(map['branch']||'Unassigned').trim() || 'Unassigned',
      bm: String(map['branchmanager']||'Unassigned').trim() || 'Unassigned',
      team: team,
      tl: String(map['teamleader']||'Unassigned').trim() || 'Unassigned',
      exec: String(map['executive']||'Unassigned').trim() || 'Unassigned',
      enquiry: Number(map['enquiry']||0)||0,
      testDrive: Number(map['testdrive']||0)||0,
      bookings: Number(map['bookings']||0)||0,
      retail: Number(map['retail']||0)||0,
      calls: Number(map['calls']||0)||0,
      accOrders: Number(map['accessoryorders']||0)||0,
      financeDone: Number(map['financedone']||0)||0,
      warrantyDone: Number(map['warrantydone']||0)||0,
    });
  });
  return out;
}

const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSI-STE6D8KcUEst_27dOcQBZYzseHZ6uspi0PF3RjsluRqpK0ZM7rOXnHtFvmZo6747pLroTr-ZH_i/pub?gid=1844731821&single=true&output=csv";

let lastSheetUrl = null;

function toCsvExportUrl(raw){
  raw = raw.trim();
  // Already a csv export/pub link
  if(/output=csv|\/pub\?/.test(raw) || raw.endsWith('.csv')) return raw;
  // Standard share link -> convert to csv export
  const m = raw.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(m){
    const gidMatch = raw.match(/gid=([0-9]+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`;
  }
  return raw;
}

function loadFromSheetUrl(rawUrl){
  const url = toCsvExportUrl(rawUrl);
  document.getElementById('fileStatus').innerHTML = 'Connecting...';
  fetch(url)
    .then(res=>{
      if(!res.ok) throw new Error('Sheet not reachable (status '+res.status+'). Make sure it is published / shared as "Anyone with the link".');
      return res.text();
    })
    .then(text=>{
      const wb = XLSX.read(text, {type:'string'});
      const sheetName = wb.SheetNames.find(n=>/daily|report|data/i.test(n)) || wb.SheetNames[0];
      const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
      const parsed = parseSheetRows(json);
      if(parsed.length===0){
        document.getElementById('fileStatus').innerHTML = 'Connected, but no matching rows found - check column headers.';
        return;
      }
      rows = parsed;
      lastSheetUrl = rawUrl;
      const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('fileStatus').innerHTML = `Live &middot; ${rows.length} rows &middot; last refreshed ${now}`;
      initFromRows();
    })
    .catch(err=>{
      document.getElementById('fileStatus').innerHTML = `<span style="color:var(--rose)">Could not load sheet: ${err.message}</span>`;
    });
}

document.getElementById('refreshBtn').addEventListener('click', ()=>{
  loadFromSheetUrl(lastSheetUrl || DEFAULT_SHEET_URL);
});

function initFromRows(){
  branches = ['All branches', ...Array.from(new Set(rows.map(r=>r.branch))).sort()];
  const branchSel = document.getElementById('branchSel');
  branchSel.innerHTML = branches.map(b=>`<option value="${b}">${b}</option>`).join('');
  state.branch = 'All branches';
  const allDates = Array.from(new Set(rows.map(r=>r.date))).sort();
  state.anchor = allDates[allDates.length-1];
  render();
}

function buildTabs(){
  const tabsEl = document.getElementById('tabs');
  const items = [{key:'overview', label:'Overview', color:'#8891A0'}]
    .concat(TEAM_ORDER.map(k=>({key:k,label:TEAMS[k].label,color:TEAMS[k].color})));
  tabsEl.innerHTML = items.map(it=>
    `<div class="tab ${state.tab===it.key?'active':''}" data-tab="${it.key}">
      <span class="dot" style="background:${it.color}"></span>${it.label}
    </div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click', ()=>{ state.tab = el.dataset.tab; render(); });
  });
}

function filteredRows(){
  return state.branch==='All branches' ? rows : rows.filter(r=>r.branch===state.branch);
}

function dateInPeriod(dateStr, period, anchor){
  const d = new Date(dateStr+'T00:00:00');
  const a = new Date(anchor+'T00:00:00');
  if(period==='day') return dateStr===anchor;
  if(period==='week'){
    const startOfWeek = new Date(a); startOfWeek.setDate(a.getDate()-a.getDay());
    const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+6);
    return d>=startOfWeek && d<=endOfWeek;
  }
  if(period==='month') return d.getFullYear()===a.getFullYear() && d.getMonth()===a.getMonth();
  return false;
}

function periodRowsFor(period, anchor){
  return filteredRows().filter(r=>dateInPeriod(r.date, period, anchor));
}

function fmtRangeLabel(){
  const a = new Date(state.anchor+'T00:00:00');
  if(state.period==='day') return a.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  if(state.period==='week'){
    const s = new Date(a); s.setDate(a.getDate()-a.getDay());
    const e = new Date(s); e.setDate(s.getDate()+6);
    return `${s.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} - ${e.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}`;
  }
  return a.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}

function shiftAnchor(dir){
  const a = new Date(state.anchor+'T00:00:00');
  if(state.period==='day') a.setDate(a.getDate()+dir);
  if(state.period==='week') a.setDate(a.getDate()+dir*7);
  if(state.period==='month') a.setMonth(a.getMonth()+dir);
  state.anchor = toLocalISO(a);
  render();
}

function sumMetrics(rowset, metrics){
  const totals = {};
  metrics.forEach(m=>totals[m]=0);
  rowset.forEach(r=> metrics.forEach(m=> totals[m]+= (r[m]||0)));
  return totals;
}

function renderKPIs(rowset){
  const kpiRow = document.getElementById('kpiRow');
  let cards = [];
  if(state.tab==='overview'){
    TEAM_ORDER.forEach(tk=>{
      const t = TEAMS[tk];
      const teamRows = rowset.filter(r=>r.team===tk);
      const totals = sumMetrics(teamRows, t.metrics);
      if(tk==='sales'){
        cards.push({kind:'funnel', label:'Sales funnel', color:t.color, stages:[
          {name:'Enquiry', val: totals.enquiry},
          {name:'Test drive', val: totals.testDrive},
          {name:'Bookings', val: totals.bookings},
          {name:'Retail', val: totals.retail},
        ]});
      } else {
        const grand = t.metrics.reduce((s,m)=>s+totals[m],0);
        cards.push({kind:'stat', label:t.label, val:grand, color:t.color, sub:t.metrics.map(m=>`${t.metricLabels[m]} ${totals[m]}`).join(' \u00b7 ')});
      }
    });
  } else if(state.tab==='sales'){
    const t = TEAMS.sales;
    const teamRows = rowset.filter(r=>r.team==='sales');
    const totals = sumMetrics(teamRows, t.metrics);
    const pct = (num, den) => den>0 ? ((num/den)*100).toFixed(1)+'%' : '0.0%';
    cards.push({kind:'stat', label:'Enquiry', val:totals.enquiry, color:t.color});
    cards.push({kind:'pct', label:'Enquiry \u2192 Test drive', val:pct(totals.testDrive, totals.enquiry)});
    cards.push({kind:'stat', label:'Test drive', val:totals.testDrive, color:t.color});
    cards.push({kind:'pct', label:'Test drive \u2192 Booking', val:pct(totals.bookings, totals.testDrive)});
    cards.push({kind:'stat', label:'Bookings', val:totals.bookings, color:t.color});
    cards.push({kind:'pct', label:'Booking \u2192 Retail', val:pct(totals.retail, totals.bookings)});
    cards.push({kind:'stat', label:'Retail', val:totals.retail, color:t.color});
  } else {
    const t = TEAMS[state.tab];
    const teamRows = rowset.filter(r=>r.team===state.tab);
    const totals = sumMetrics(teamRows, t.metrics);
    t.metrics.forEach(m=> cards.push({kind:'stat', label:t.metricLabels[m], val:totals[m], color:t.color}));
    const execCount = new Set(teamRows.map(r=>r.exec)).size;
    cards.push({kind:'stat', label:'Active executives', val:execCount, color:'#8891A0'});
  }
  kpiRow.innerHTML = cards.map(renderKpiCard).join('');
}

function renderKpiCard(c){
  if(c.kind==='pct'){
    return `<div class="kpi pct">
      <div class="lbl">${c.label}</div>
      <div class="val pctval">${c.val}</div>
    </div>`;
  }
  if(c.kind==='funnel'){
    return `<div class="kpi funnelcard">
      <div class="bar-accent" style="background:${c.color}"></div>
      <div class="lbl">${c.label}</div>
      <div class="funnel-row">
        ${c.stages.map((s,i)=>{
          let arrow = '';
          if(i>0){
            const prev = c.stages[i-1].val;
            const p = prev>0 ? ((s.val/prev)*100).toFixed(0) : '0';
            arrow = `<div class="funnel-arrow">&rarr;<span>${p}%</span></div>`;
          }
          return `${arrow}<div class="funnel-stage"><div class="fval">${s.val}</div><div class="fname">${s.name}</div></div>`;
        }).join('')}
      </div>
    </div>`;
  }
  return `<div class="kpi">
    <div class="bar-accent" style="background:${c.color}"></div>
    <div class="lbl">${c.label}</div>
    <div class="val">${c.val}</div>
    ${c.sub?`<div class="sub">${c.sub}</div>`:''}
  </div>`;
}

function renderHierarchy(rowset){
  const table = document.getElementById('hierTable');
  const teamsToShow = state.tab==='overview' ? TEAM_ORDER : [state.tab];
  const metricCols = state.tab==='overview' ? ['total'] : TEAMS[state.tab].metrics;
  const colLabels = state.tab==='overview' ? ['Total activity'] : TEAMS[state.tab].metrics.map(m=>TEAMS[state.tab].metricLabels[m]);
  table.querySelector('thead').innerHTML = `<tr><th>Reporting chain</th>${colLabels.map(l=>`<th style="text-align:right">${l}</th>`).join('')}</tr>`;

  const tree = {};
  rowset.filter(r=>teamsToShow.includes(r.team)).forEach(r=>{
    tree[r.bm] = tree[r.bm] || {};
    tree[r.bm][r.tl] = tree[r.bm][r.tl] || {};
    tree[r.bm][r.tl][r.exec] = tree[r.bm][r.tl][r.exec] || {};
    const t = TEAMS[r.team];
    t.metrics.forEach(m=>{
      tree[r.bm][r.tl][r.exec][m] = (tree[r.bm][r.tl][r.exec][m]||0) + (r[m]||0);
    });
  });

  function metricVal(obj, col){
    if(col==='total') return Object.values(obj).reduce((s,v)=>s+(typeof v==='number'?v:0),0);
    return obj[col]||0;
  }
  function sumChildren(children, col){
    let s=0;
    Object.values(children).forEach(c=> s += metricVal(c, col));
    return s;
  }

  let html='';
  Object.keys(tree).sort().forEach(bm=>{
    const tls = tree[bm];
    const bmCols = metricCols.map(col=>{
      let s=0;
      Object.values(tls).forEach(execs=> s+= sumChildren(execs,col));
      return s;
    });
    html += `<tr class="lvl0"><td><span class="caret">&#9656;</span>${bm}</td>${bmCols.map(v=>`<td class="tval">${v}</td>`).join('')}</tr>`;
    Object.keys(tls).sort().forEach(tl=>{
      const execs = tls[tl];
      const tlCols = metricCols.map(col=> sumChildren(execs,col));
      html += `<tr class="lvl1"><td>${tl}</td>${tlCols.map(v=>`<td class="tval">${v}</td>`).join('')}</tr>`;
      Object.keys(execs).sort().forEach(ex=>{
        const exCols = metricCols.map(col=> metricVal(execs[ex], col));
        html += `<tr class="lvl2"><td>${ex}</td>${exCols.map(v=>`<td class="tval">${v}</td>`).join('')}</tr>`;
      });
    });
  });
  table.querySelector('tbody').innerHTML = html || '<tr><td colspan="5" style="color:var(--muted);padding:16px 8px;">No data for this selection</td></tr>';
}

function renderTrend(){
  const ctx = document.getElementById('trendChart');
  const days = Array.from(new Set(filteredRows().map(r=>r.date))).sort().slice(-14);
  const teamsToPlot = state.tab==='overview' ? TEAM_ORDER : [state.tab];
  document.getElementById('chartTitle').textContent = state.tab==='overview' ? 'Team activity, last 14 days' : `${TEAMS[state.tab].label} trend, last 14 days`;
  const datasets = teamsToPlot.map(tk=>{
    const t = TEAMS[tk];
    return {
      label: t.label,
      data: days.map(d=>{
        const dayRows = filteredRows().filter(r=>r.date===d && r.team===tk);
        return t.metrics.reduce((s,m)=> s + dayRows.reduce((ss,r)=>ss+(r[m]||0),0), 0);
      }),
      borderColor: t.color, backgroundColor: t.color+'33', tension:.3, fill:false, borderWidth:2, pointRadius:2,
    };
  });
  if(trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(ctx, {
    type:'line',
    data:{labels:days.map(d=>d.slice(5)), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{
        x:{ticks:{color:'#8891A0',font:{size:10}}, grid:{color:'#2A3441'}},
        y:{ticks:{color:'#8891A0',font:{size:10}}, grid:{color:'#2A3441'}, beginAtZero:true}
      },
      plugins:{legend:{display:false}}
    }
  });
}

function dayTotal(dateStr){
  const dayRows = filteredRows().filter(r=>r.date===dateStr);
  let total=0;
  TEAM_ORDER.forEach(tk=> TEAMS[tk].metrics.forEach(m=> dayRows.forEach(r=>{ if(r.team===tk) total+=(r[m]||0); })));
  return total;
}

function gaugeSVG(pct, color){
  const r=22, c=2*Math.PI*r;
  const off = c*(1-Math.min(pct,1));
  return `<svg width="52" height="52" viewBox="0 0 52 52">
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="#2A3441" stroke-width="5"/>
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 26 26)"/>
  </svg>`;
}

function renderGaugeStrip(){
  const strip = document.getElementById('gaugeStrip');
  const allDays = Array.from(new Set(filteredRows().map(r=>r.date))).sort().slice(-14);
  const totals = allDays.map(d=>dayTotal(d));
  const max = Math.max(1, ...totals);
  strip.innerHTML = allDays.map((d,i)=>{
    const dt = new Date(d+'T00:00:00');
    const pct = totals[i]/max;
    return `<div class="gauge" data-date="${d}">
      <div class="dow">${dt.toLocaleDateString('en-IN',{weekday:'short'})}</div>
      ${gaugeSVG(pct, '#FF8A3D')}
      <div class="dnum">${dt.getDate()}</div>
    </div>`;
  }).join('');
  strip.querySelectorAll('.gauge').forEach(el=>{
    el.addEventListener('click', ()=> openDayModal(el.dataset.date));
  });
}

function buildTeamTable(tk, teamRows){
  const t = TEAMS[tk];
  const isSales = tk === 'sales';
  const metricKeys = isSales ? ['enquiry','testDrive','bookings','retail'] : t.metrics;
  const headerCells = isSales
    ? ['Enquiry','%','Test drive','%','Bookings','%','Retail']
    : metricKeys.map(m=>t.metricLabels[m]);

  const groups = {};
  teamRows.forEach(r=>{
    groups[r.tl] = groups[r.tl] || [];
    groups[r.tl].push(r);
  });

  function pct(num, den){ return den>0 ? Math.round((num/den)*100)+'%' : '0%'; }

  function rowCells(vals){
    if(!isSales) return vals.map(v=>`<td class="tval">${v}</td>`).join('');
    const [enq,td,bk,rt] = vals;
    return `<td class="tval">${enq}</td><td class="tval pctcell">${pct(td,enq)}</td>`
      + `<td class="tval">${td}</td><td class="tval pctcell">${pct(bk,td)}</td>`
      + `<td class="tval">${bk}</td><td class="tval pctcell">${pct(rt,bk)}</td>`
      + `<td class="tval">${rt}</td>`;
  }

  let rowsHtml = '';
  let idx = 0;
  Object.keys(groups).sort().forEach(tl=>{
    const execs = groups[tl];
    const sums = metricKeys.map(m => execs.reduce((s,r)=>s+(r[m]||0),0));
    const tlId = tk+'_tl_'+(idx++);
    rowsHtml += `<tr class="tl-row" data-tl="${tlId}"><td><span class="caret">&#9656;</span>${tl}</td>${rowCells(sums)}</tr>`;
    execs.forEach(r=>{
      const vals = metricKeys.map(m=>r[m]||0);
      rowsHtml += `<tr class="exec-row" data-parent="${tlId}" style="display:none;"><td class="indent">${r.exec}</td>${rowCells(vals)}</tr>`;
    });
  });

  return `<table class="modal-metric-table">
    <thead><tr><th>Team leader</th>${headerCells.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;
}

function openDayModal(dateStr){
  const dayRows = filteredRows().filter(r=>r.date===dateStr);
  const dt = new Date(dateStr+'T00:00:00');
  document.getElementById('modalDate').textContent = dt.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('modalSub').textContent = state.branch==='All branches' ? 'All branches' : state.branch;
  let html='';
  TEAM_ORDER.forEach(tk=>{
    const t = TEAMS[tk];
    const teamRows = dayRows.filter(r=>r.team===tk);
    if(teamRows.length===0) return;
    const totals = sumMetrics(teamRows, t.metrics);
    html += `<div class="modal-team">
      <div class="mt-head"><span class="dot" style="background:${t.color}"></span><b>${t.label}</b></div>
      <div class="mt-metrics">${t.metrics.map(m=>`<div>${totals[m]}<span>${t.metricLabels[m]}</span></div>`).join('')}</div>
      ${buildTeamTable(tk, teamRows)}
    </div>`;
  });
  document.getElementById('modalBody').innerHTML = html || '<div class="empty">No rows recorded for this date.</div>';
  document.getElementById('modalOverlay').classList.add('show');

  document.querySelectorAll('#modalBody .tl-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = row.dataset.tl;
      const expanded = row.classList.toggle('expanded');
      document.querySelectorAll(`#modalBody .exec-row[data-parent="${id}"]`).forEach(er=>{
        er.style.display = expanded ? 'table-row' : 'none';
      });
      const caret = row.querySelector('.caret');
      if(caret) caret.innerHTML = expanded ? '&#9662;' : '&#9656;';
    });
  });
}

document.getElementById('modalClose').addEventListener('click', ()=> document.getElementById('modalOverlay').classList.remove('show'));
document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') e.currentTarget.classList.remove('show'); });

document.getElementById('branchSel').addEventListener('change', e=>{ state.branch = e.target.value; render(); });
document.getElementById('prevBtn').addEventListener('click', ()=> shiftAnchor(-1));
document.getElementById('nextBtn').addEventListener('click', ()=> shiftAnchor(1));
document.querySelectorAll('#periodSeg button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.period = btn.dataset.p;
    document.querySelectorAll('#periodSeg button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function render(){
  buildTabs();
  document.getElementById('rangeLabel').textContent = fmtRangeLabel();
  const rowset = periodRowsFor(state.period, state.anchor);
  renderKPIs(rowset);
  renderHierarchy(rowset);
  renderTrend();
  renderGaugeStrip();
}

rows = genSample();
initFromRows();
document.querySelector('#periodSeg button[data-p="day"]').classList.add('active');
loadFromSheetUrl(DEFAULT_SHEET_URL);
</script>
</body>
